name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  security-and-build:

    runs-on: ubuntu-latest

    steps:

      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Bandit Security Scan
        run: |
          bandit -r .

      - name: Python Dependency Scan
        run: |
          pip-audit

      - name: Docker Image bauen
        run: |
          docker build -t devsecops-python .

      - name: Trivy installieren
        run: |
          sudo apt-get update
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.66.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.66.0_Linux-64bit.deb


          - name: Run pip-audit
        run: pip-audit -r requirements.txt


