services:
  web:
    build: .
    container_name: devsecops-python-container
    env_file:
      - .env
    expose:
      - "5000"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - web

    restart: unless-stopped